name: typecheck

# GitHub Actions only discovers workflows under <repo-root>/.github/workflows — this repo's
# git root is one level above the impactr/ application (see CLAUDE.md), so this file must live
# here, not under impactr/.github/workflows (a copy exists there but is never run by GitHub).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impactr
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Mirrors impactr/.github/actions/setup-bun (baseline x64 binary to avoid "Illegal
      # instruction" crashes on runners without AVX2, plus a bun.lock-keyed dependency cache).
      # That composite action can't be reused directly from a repo-root workflow: per GitHub's
      # own composite-action ADR, a composite action's `run` steps never inherit the calling
      # workflow's `defaults.run.working-directory`, and `working-directory` isn't a valid
      # property on the calling `uses:` step either — so its `./package.json` read would hit
      # the (nonexistent) repo-root package.json instead of impactr/package.json. Inlined here
      # instead, under this job's own `defaults.run.working-directory: impactr`.
      - name: Get baseline download URL
        id: bun-url
        run: |
          if [ "$RUNNER_ARCH" = "X64" ]; then
            V=$(node -p "require('./package.json').packageManager.split('@')[1]")
            case "$RUNNER_OS" in
              macOS)   OS=darwin ;;
              Linux)   OS=linux ;;
              Windows) OS=windows ;;
            esac
            echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-x64-baseline.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ${{ !steps.bun-url.outputs.url && 'impactr/package.json' || '' }}
          bun-download-url: ${{ steps.bun-url.outputs.url }}

      - name: Get cache directory
        id: cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      # Python 3.12+ dropped distutils, which some native (node-gyp) postinstall builds still
      # expect via setuptools' shim. Best-effort, matching the composite action.
      - name: Install setuptools for distutils compatibility
        run: python3 -m pip install setuptools || pip install setuptools || true

      - name: Restore Bun dependencies
        id: bun-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Save Bun dependencies
        if: steps.bun-cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Run typecheck
        run: bun typecheck
